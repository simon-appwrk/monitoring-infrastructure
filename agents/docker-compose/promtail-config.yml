server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  # ────────── Host system logs ──────────
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          project: ${PROJECT}
          environment: ${ENVIRONMENT}
          team: ${TEAM}
          host: ${HOSTNAME}
          host_class: docker-host
          __path__: /var/log/{syslog,messages,auth.log,kern.log}

  # ────────── Docker container logs ──────────
  # Uses Docker's json-file driver. Pulls labels from the container itself —
  # apps should be deployed with Docker labels: project=, environment=, team=, service=.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_project]
        target_label: project
      - source_labels: [__meta_docker_container_label_environment]
        target_label: environment
      - source_labels: [__meta_docker_container_label_team]
        target_label: team
      - source_labels: [__meta_docker_container_label_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: '/(.+)'
        target_label: container
      - target_label: host
        replacement: ${HOSTNAME}
      - target_label: host_class
        replacement: docker-host
      # Drop containers that didn't set required labels — keeps the unrouted bucket clean.
      # Comment out during onboarding if you want to see "missing labels" data first.
      - source_labels: [project]
        regex: ^$
        action: drop

    pipeline_stages:
      # If logs are JSON, parse common fields up to a `level` label
      - json:
          expressions:
            level: level
            msg: message
      - labels:
          level:

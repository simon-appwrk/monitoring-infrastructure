groups:
  - name: infrastructure
    rules:

      - alert: NodeDown
        expr: up{job=~"node-exporter|vm-node-exporter|vps-node-exporter"} == 0
        for: 2m
        labels:
          project: infra
          environment: production
          team: platform
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "node_exporter on {{ $labels.instance }} has been unreachable for 2+ minutes."

      - alert: HighCPULoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          project: infra
          environment: production
          team: platform
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage on {{ $labels.instance }} has been >90% for 10 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          project: infra
          environment: production
          team: platform
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 < 15
        for: 10m
        labels:
          project: infra
          environment: production
          team: platform
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }} ({{ $labels.mountpoint }})"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 < 5
        for: 2m
        labels:
          project: infra
          environment: production
          team: platform
          severity: critical
        annotations:
          summary: "CRITICAL disk on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Less than 5% disk space on {{ $labels.mountpoint }}."

      - alert: ClockSkew
        expr: abs(node_timex_offset_seconds) > 0.5
        for: 5m
        labels:
          project: infra
          environment: production
          team: platform
          severity: warning
        annotations:
          summary: "Clock skew on {{ $labels.instance }} >500ms"

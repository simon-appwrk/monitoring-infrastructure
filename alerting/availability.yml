groups:
  - name: availability
    rules:

      - alert: TargetDown
        # Generic 'app reports up=0' — relies on the project label being on the scrape job
        expr: up{job!~"node-exporter|vm-node-exporter|vps-node-exporter"} == 0
        for: 3m
        labels:
          project: "{{ $labels.project }}"
          environment: "{{ $labels.environment }}"
          team: "{{ $labels.team }}"
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target down ({{ $labels.instance }})"

      - alert: BlackboxHTTPFailure
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          project: "{{ $labels.project }}"
          environment: "{{ $labels.environment }}"
          team: "{{ $labels.team }}"
          severity: critical
        annotations:
          summary: "Endpoint {{ $labels.instance }} unreachable"
          description: "Blackbox probe failed for {{ $labels.instance }} — last status_code={{ $labels.probe_http_status_code }}."

      - alert: TLSCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          project: "{{ $labels.project }}"
          environment: "{{ $labels.environment }}"
          team: "{{ $labels.team }}"
          severity: warning
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in <14 days"

      - alert: TLSCertExpiringCritical
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 3
        for: 30m
        labels:
          project: "{{ $labels.project }}"
          environment: "{{ $labels.environment }}"
          team: "{{ $labels.team }}"
          severity: critical
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in <3 days"

# Loki — SingleBinary mode for single-node k3s.
# Retention: 7 days. Chunks live in MinIO.
# MinIO credentials come from Secret "loki-s3" as MINIO_ACCESS_KEY / MINIO_SECRET_KEY env vars.
# Loki substitutes ${MINIO_ACCESS_KEY} / ${MINIO_SECRET_KEY} into its config via -config.expand-env=true.

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path
  # Tell Loki to expand ${VAR} in its config file at startup.
  # Without this flag, Loki would send the literal string "${MINIO_ACCESS_KEY}" to MinIO.
  extraArgs:
    - -config.expand-env=true
  # Inject MinIO credentials as env vars from Secret loki-s3.
  # These names are arbitrary — what matters is they match the ${...} refs in loki.storage.s3.
  extraEnv:
    - name: MINIO_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: MINIO_ACCESS_KEY
    - name: MINIO_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: MINIO_SECRET_KEY
  # Mount log-based alert rules (rules ConfigMap is created by apps/61-loki-ruler.yaml)
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake     # 'fake' = default tenant in single-tenant mode

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2025-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: minio.obs-storage.svc:9000
      region: us-east-1
      # ${...} is expanded by Loki at startup because singleBinary.extraArgs has
      # -config.expand-env=true. Env vars come from singleBinary.extraEnv (Secret loki-s3).
      accessKeyId: ${MINIO_ACCESS_KEY}
      secretAccessKey: ${MINIO_SECRET_KEY}
      s3ForcePathStyle: true
      insecure: true

  limits_config:
    retention_period: 168h        # 7 days
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_query_series: 5000
    max_query_parallelism: 16

  compactor:
    retention_enabled: true
    delete_request_store: s3

  ruler:
    enable_api: true
    enable_alertmanager_v2: true
    alertmanager_url: http://kps-kube-prometheus-stack-alertmanager.obs-metrics.svc:9093
    storage:
      type: local
      local:
        directory: /var/loki/rules
    rule_path: /var/loki/rules-temp

# Gateway = nginx fronting Loki. Push (write) on NodePort 30100.
gateway:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    nodePort: 30100
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Second NodePort Service for the read path (Grafana queries via in-cluster URL,
# so this is only useful for ad-hoc operator access)
extraObjects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: loki-query
      namespace: obs-logs
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: single-binary
      ports:
        - name: http
          port: 3100
          targetPort: 3100
          nodePort: 30101

chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Loki Canary is a self-test pod that constantly tails Loki and reports if data is missing.
# Useful in production-scale deployments; just noise on a single-node setup.
lokiCanary:
  enabled: false

# Test pods (run only when you `helm test`) — disable to keep the cluster cleaner
test:
  enabled: false

# Don't try to install/upgrade monitoring rules into our existing Prometheus
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

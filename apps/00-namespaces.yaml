apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/simon-appwrk/monitoring-infrastructure
    targetRevision: main
    path: manifests
    directory:
      include: namespaces.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false           # don't auto-delete namespaces
      selfHeal: true

# Copy to values.secrets.local.yaml on the server (gitignored), fill in real values.
#
# Feeds two things:
#   - Secret "minio-root" (rootUser/rootPassword) — referenced by existingSecret in values.yaml
#   - The chart's `users:` block — install.sh merges these in via --set so the access keys
#     match what Loki/Harbor expect.

minioRoot:
  user: admin
  password: CHANGEME-minio-root-password-min-8-chars

# These secret keys MUST match:
#   - lokiMinio.secretKey  in k8s/loki/values.secrets.local.yaml
#   - harborS3.secretKey   in k8s/harbor/values.secrets.local.yaml
minioUsers:
  loki:
    secretKey: CHANGEME-loki-minio-secret-key
  harbor:
    secretKey: CHANGEME-harbor-minio-secret-key

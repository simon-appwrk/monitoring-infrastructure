# MinIO values
# Chart: minio/minio
# Standalone mode (single replica) — appropriate for single-node k3s.
# No backup of buckets — accept loss on rebuild.

mode: standalone
replicas: 1

# Root credentials live in Secret "minio-root" (created by install.sh from values.secrets.local.yaml)
existingSecret: minio-root

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# NodePort exposure
service:
  type: NodePort
  port: 9000
  nodePort: 30900

consoleService:
  type: NodePort
  port: 9001
  nodePort: 30901

# NOTE: users + buckets are NOT created by the chart's `users:` / `buckets:` blocks.
# The chart's post-install Job for those is unreliable. install.sh runs `mc admin user add`
# and `mc mb` via `kubectl exec` after MinIO is up — see the "MinIO users + buckets" step.
#
# Buckets created:  loki-chunks, loki-ruler, loki-admin, harbor-blobs
# Users created:    loki (readwrite), harbor (readwrite)
# Secret keys come from k8s/minio/values.secrets.local.yaml :: minioUsers.{loki,harbor}.secretKey

# MinIO values
# Chart: minio/minio
# Standalone mode (single replica) — appropriate for single-node k3s.
# No backup of buckets — accept loss on rebuild.

mode: standalone
replicas: 1

# Root credentials live in Secret "minio-root" (created by install.sh from values.secrets.local.yaml)
existingSecret: minio-root

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# NodePort exposure
service:
  type: NodePort
  port: 9000
  nodePort: 30900

consoleService:
  type: NodePort
  port: 9001
  nodePort: 30901

# Pre-create the buckets Loki + Harbor need
buckets:
  - name: loki-chunks
    policy: none
    purge: false
  - name: loki-ruler
    policy: none
    purge: false
  - name: loki-admin
    policy: none
    purge: false
  - name: harbor-blobs
    policy: none
    purge: false

# Pre-create access keys. Secrets come from values.secrets.local.yaml (see merge in install.sh).
# DO NOT put real secret keys here.
users:
  - accessKey: loki
    secretKey: CHANGEME-overridden-by-secrets-file
    policy: readwrite
  - accessKey: harbor
    secretKey: CHANGEME-overridden-by-secrets-file
    policy: readwrite

# YACE Helm values
# Chart: nerdswords/yet-another-cloudwatch-exporter

replicas: 1

# AWS creds via Secret "yace-aws-creds" (see README.md)
serviceAccount:
  create: true
extraEnv:
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: yace-aws-creds
        key: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: yace-aws-creds
        key: AWS_SECRET_ACCESS_KEY

# Scrape config from ConfigMap "yace-config"
config: ""   # disabled — we mount via volume instead so it can be edited without chart upgrade
extraVolumes:
  - name: yace-config
    configMap:
      name: yace-config
extraVolumeMounts:
  - name: yace-config
    mountPath: /tmp/config.yml
    subPath: config.yml
extraArgs:
  - -config.file=/tmp/config.yml

# Service: cluster-internal only. Prometheus scrapes via the in-cluster DNS name.
# No NodePort — YACE shouldn't be exposed externally.
service:
  type: ClusterIP
  port: 5000

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

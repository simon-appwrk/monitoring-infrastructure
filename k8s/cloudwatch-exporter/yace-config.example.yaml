# YACE configuration. Defines which AWS services + regions to scrape.
# Reference: https://github.com/nerdswords/yet-another-cloudwatch-exporter/blob/master/docs/configuration.md
#
# Copy to yace-config.local.yaml, edit for your AWS account, then create the ConfigMap (see README).

apiVersion: v1alpha1

# Tag-based discovery: YACE finds resources tagged with these keys and uses them as labels.
# Match the labels we use everywhere else: project, environment, team.
sts-region: us-east-1

discovery:
  exportedTagsOnMetrics:
    AWS/RDS:        [project, environment, team]
    AWS/EC2:        [project, environment, team]
    AWS/ApplicationELB: [project, environment, team]
    AWS/ELB:        [project, environment, team]
    AWS/SQS:        [project, environment, team]
    AWS/Lambda:     [project, environment, team]
    AWS/EBS:        [project, environment, team]
    AWS/S3:         [project, environment, team]
    AWS/ElastiCache:[project, environment, team]

  jobs:

    # ── RDS ──────────────────────────────────────────────────────────
    - type: AWS/RDS
      regions: [us-east-1]
      period: 300
      length: 600
      searchTags:
        - key: project
          value: ".+"           # require the project tag — untagged resources are skipped
      metrics:
        - name: CPUUtilization
          statistics: [Average, Maximum]
        - name: FreeableMemory
          statistics: [Average]
        - name: DatabaseConnections
          statistics: [Average, Maximum]
        - name: ReadLatency
          statistics: [Average]
        - name: WriteLatency
          statistics: [Average]
        - name: FreeStorageSpace
          statistics: [Minimum]

    # ── ALB ──────────────────────────────────────────────────────────
    - type: AWS/ApplicationELB
      regions: [us-east-1]
      period: 60
      length: 600
      searchTags:
        - key: project
          value: ".+"
      metrics:
        - name: RequestCount
          statistics: [Sum]
        - name: HTTPCode_Target_5XX_Count
          statistics: [Sum]
        - name: HTTPCode_ELB_5XX_Count
          statistics: [Sum]
        - name: TargetResponseTime
          statistics: [Average, p99]

    # ── SQS ──────────────────────────────────────────────────────────
    - type: AWS/SQS
      regions: [us-east-1]
      period: 60
      length: 300
      searchTags:
        - key: project
          value: ".+"
      metrics:
        - name: ApproximateNumberOfMessagesVisible
          statistics: [Average, Maximum]
        - name: ApproximateAgeOfOldestMessage
          statistics: [Maximum]

    # ── Lambda ──────────────────────────────────────────────────────
    - type: AWS/Lambda
      regions: [us-east-1]
      period: 60
      length: 600
      searchTags:
        - key: project
          value: ".+"
      metrics:
        - name: Invocations
          statistics: [Sum]
        - name: Errors
          statistics: [Sum]
        - name: Duration
          statistics: [Average, p99]
        - name: Throttles
          statistics: [Sum]

# Static (non-discovery) jobs go here if you have specific dimensions you want to scrape
# regardless of tags. Empty by default.
static: []

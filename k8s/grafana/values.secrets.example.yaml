# Copy to values.secrets.local.yaml on the server (gitignored), fill in real values.
#
# This file feeds two K8s Secrets created out-of-band by install.sh:
#   - grafana-admin (admin user/password)
#   - grafana-oidc  (Keycloak client secret, exposed as GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET)
#
# install.sh reads the values below and creates the Secrets via `kubectl create secret`.
# The Helm chart references them by name (existingSecret / envFromSecret).

grafanaAdmin:
  user: admin
  password: CHANGEME-strong-random-password

grafanaOidc:
  # Keycloak client secret for the 'grafana' client
  clientSecret: CHANGEME-keycloak-client-secret

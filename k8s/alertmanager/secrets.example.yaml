# Copy to secrets.local.yaml on the server (gitignored), fill in real values, then:
#   kubectl apply -f k8s/alertmanager/secrets.local.yaml
#
# This Secret is mounted into the Alertmanager pod at:
#   /etc/alertmanager/secrets/alertmanager-webhooks/<key>
# (because k8s/prometheus/values.yaml sets alertmanager.alertmanagerSpec.secrets:
#   - alertmanager-webhooks)
#
# config.yaml references each key by file path (e.g. api_url_file: .../slack-platform-url).

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-webhooks
  namespace: obs-metrics
type: Opaque
stringData:
  # Slack incoming webhook URLs — one per channel
  slack-platform-url: https://hooks.slack.com/services/CHANGEME/CHANGEME/CHANGEME

  # SMTP password for global.smtp_auth_password_file
  smtp-password: CHANGEME-smtp-password

  # Optional: per-team webhooks (referenced from project-specific receivers,
  # see examples/project-onboarding/alertmanager-route-snippet.yaml)
  # slack-url-payment-api: https://hooks.slack.com/services/CHANGEME/...
  # discord-url-payment-api: https://discord.com/api/webhooks/CHANGEME/...
  # telegram-bot-token: CHANGEME-bot-token
  # telegram-chat-id-payment-api: "CHANGEME-chat-id"

# Copy to values.secrets.local.yaml on the server (gitignored), fill in real values.
#
# This file is passed to Helm as a SECOND -f overlay (after values.yaml).
# Helm merges it on top, injecting the real S3 creds into loki.storage.s3 directly.
# No env-var expansion involved.
#
# accessKeyId MUST be 'loki' (the username we created in MinIO).
# secretAccessKey MUST match minioUsers.loki.secretKey in k8s/minio/values.secrets.local.yaml.

loki:
  storage:
    s3:
      accessKeyId: loki
      secretAccessKey: CHANGEME-loki-minio-secret-key

# Copy to values.secrets.local.yaml on the server (gitignored), fill in real values.
#
# Feeds the K8s Secret "loki-minio" — Loki reads MINIO_ACCESS_KEY / MINIO_SECRET_KEY from
# the secret as env vars, then ${VAR} is substituted into loki.storage.s3 in values.yaml.
#
# Use the SAME values you put under minioUsers.loki in k8s/minio/values.secrets.local.yaml.

lokiMinio:
  accessKey: loki
  secretKey: CHANGEME-loki-minio-secret-key

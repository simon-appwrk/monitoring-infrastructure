# Loki values
# Chart: grafana/loki
# SingleBinary mode (one pod that does write + read + index) — appropriate for single-node k3s.
# Retention: 7 days. Chunks live in MinIO.

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path

# Disable the scaled deployments
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

loki:
  auth_enabled: false   # single-tenant; project isolation via labels + Grafana RBAC
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2025-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: minio.obs-storage.svc:9000
      region: us-east-1
      # Credentials come from Secret "loki-minio" via env (see extraEnvFrom below).
      # Loki expands ${VAR} when started with -config.expand-env=true (set automatically by chart).
      accessKeyId: ${MINIO_ACCESS_KEY}
      secretAccessKey: ${MINIO_SECRET_KEY}
      s3ForcePathStyle: true
      insecure: true

  limits_config:
    retention_period: 168h        # 7 days
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_query_series: 5000
    max_query_parallelism: 16

  # Compactor handles retention deletion
  compactor:
    retention_enabled: true
    delete_request_store: s3

  ruler:
    enable_api: true
    enable_alertmanager_v2: true
    alertmanager_url: http://kps-kube-prometheus-stack-alertmanager.obs-metrics.svc:9093
    storage:
      type: local
      local:
        directory: /var/loki/rules
    rule_path: /var/loki/rules-temp

# Inject MinIO creds for the s3 storage block
extraEnvFrom:
  - secretRef:
      name: loki-minio

# Mount log-based alert rules from the loki-rules ConfigMap
extraVolumes:
  - name: loki-rules
    configMap:
      name: loki-rules
extraVolumeMounts:
  - name: loki-rules
    mountPath: /var/loki/rules/fake     # 'fake' = default tenant in single-tenant mode

# Gateway = nginx fronting Loki. Push (write) on 30100, query (read) on 30101.
gateway:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    nodePort: 30100        # write/push
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Second NodePort Service for the read path (operators / Grafana)
extraObjects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: loki-query
      namespace: obs-logs
    spec:
      type: NodePort
      selector:
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: single-binary
      ports:
        - name: http
          port: 3100
          targetPort: 3100
          nodePort: 30101

# Disable components we don't need in SingleBinary mode
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Copy to values.secrets.local.yaml on the server (gitignored), fill in real values.
#
# Feeds three K8s Secrets created by install.sh:
#   - harbor-admin     → HARBOR_ADMIN_PASSWORD (consumed by chart's existingSecretAdminPassword)
#   - harbor-database  → POSTGRES_PASSWORD (consumed by chart's database.internal.existingSecret)
# And one --set override:
#   - harborS3.secretKey → injected into persistence.imageChartStorage.s3.secretkey

harborAdmin:
  password: CHANGEME-harbor-admin-password

harborDatabase:
  password: CHANGEME-harbor-postgres-password

harborS3:
  # MUST match minioUsers.harbor.secretKey in k8s/minio/values.secrets.local.yaml
  accessKey: harbor
  secretKey: CHANGEME-harbor-minio-secret-key
